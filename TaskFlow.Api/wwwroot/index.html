<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Foco na Aprovação</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #181b22;
      --line: #262b36;
      --txt: #e7e9ee;
      --muted: #9aa3b2;
      --accent: #5b8cff;
      --done: #3ddc97;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 70% -10%, #1b2540 0%, var(--bg) 55%);
      color: var(--txt);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }
    .app { width: 100%; max-width: 560px; }
    header h1 { font-size: 1.9rem; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); margin-top: 4px; font-size: 0.92rem; }
    .frase {
      margin: 22px 0;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      font-style: italic;
      color: #cdd3df;
    }
    .frase small { display: block; margin-top: 6px; font-style: normal; color: var(--muted); }
    .add { display: flex; gap: 8px; margin-bottom: 18px; }
    input[type="text"] {
      flex: 1;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--txt);
      font-size: 0.95rem;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      border: none; cursor: pointer; border-radius: 10px;
      font-weight: 600; font-size: 0.92rem;
    }
    .add button { padding: 0 18px; background: var(--accent); color: #fff; }
    .add button:hover { filter: brightness(1.08); }
    ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    li {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 15px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
    }
    li .titulo { flex: 1; }
    li.feita .titulo { text-decoration: line-through; color: var(--muted); }
    .chk {
      width: 20px; height: 20px; border-radius: 6px;
      border: 1.5px solid var(--line); background: transparent; cursor: pointer;
      display: grid; place-items: center; color: var(--done); font-size: 13px;
    }
    li.feita .chk { border-color: var(--done); }
    .del { background: transparent; color: var(--muted); padding: 4px 8px; font-size: 1.1rem; }
    .del:hover { color: #ff6b6b; }
    .vazio { color: var(--muted); text-align: center; padding: 28px; font-size: 0.9rem; }
    footer { margin-top: 26px; text-align: center; color: var(--muted); font-size: 0.78rem; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Task<span>Flow</span></h1>
      <p>Fatie o edital em micro-metas. Foco na aprovação.</p>
    </header>

    <div class="frase" id="frase">Carregando frase do dia...</div>

    <div class="add">
      <input type="text" id="nova" placeholder="Nova meta de estudo..." />
      <button onclick="adicionar()">Adicionar</button>
    </div>

    <ul id="lista"></ul>
    <div class="vazio" id="vazio" style="display:none">Nenhuma meta ainda. Bora começar! 🎯</div>

    <footer>
      Dados persistidos no Supabase (PostgreSQL) ·
      <a href="/swagger" target="_blank">Documentação da API</a>
    </footer>
  </div>

  <script>
    const API = "/api/tarefas";

    async function carregar() {
      const res = await fetch(API);
      const tarefas = await res.json();
      const ul = document.getElementById("lista");
      const vazio = document.getElementById("vazio");
      ul.innerHTML = "";
      vazio.style.display = tarefas.length ? "none" : "block";

      for (const t of tarefas) {
        const li = document.createElement("li");
        if (t.concluida) li.classList.add("feita");
        li.innerHTML = `
          <button class="chk" onclick="concluir(${t.id})">${t.concluida ? "✓" : ""}</button>
          <span class="titulo">${escapar(t.titulo)}</span>
          <button class="del" onclick="remover(${t.id})">×</button>`;
        ul.appendChild(li);
      }
    }

    async function adicionar() {
      const input = document.getElementById("nova");
      const titulo = input.value.trim();
      if (!titulo) return;
      await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ titulo })
      });
      input.value = "";
      carregar();
    }

    async function concluir(id) {
      await fetch(`${API}/${id}/concluir`, { method: "PATCH" });
      carregar();
    }

    async function remover(id) {
      await fetch(`${API}/${id}`, { method: "DELETE" });
      carregar();
    }

    async function carregarFrase() {
      try {
        const res = await fetch("/api/frase-do-dia");
        const q = await res.json();
        document.getElementById("frase").innerHTML =
          `"${escapar(q.texto)}"<small>— ${escapar(q.autor)}</small>`;
      } catch {
        document.getElementById("frase").textContent = "A disciplina é a ponte entre metas e conquistas.";
      }
    }

    function escapar(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    document.getElementById("nova").addEventListener("keydown", e => {
      if (e.key === "Enter") adicionar();
    });

    carregarFrase();
    carregar();
  </script>
</body>
</html>
